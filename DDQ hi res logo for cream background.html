<style>
  :root {
    --ink: #1a1008;
    --paper: #f5f0e8; /* The Beige/Cream background */
    --gold-dark: #b8860b; /* A slightly deeper gold for better contrast on light backgrounds */
  }

  /* Sized for a high-res square print area */
  .mug-print-area {
    width: 600px; 
    height: 600px; 
    background: var(--paper); 
    color: var(--ink);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 50px;
    box-sizing: border-box;
  }

  .logo-city {
    font-family: 'Courier Prime', monospace;
    font-size: 28px;
    letter-spacing: 14px;
    text-transform: uppercase;
    color: var(--gold-dark);
    margin-bottom: 15px;
    font-weight: 700;
  }

  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: 90px; 
    font-weight: 900;
    line-height: 1.0;
    margin: 0;
    color: var(--ink);
  }

  /* We put the gold on the middle word for that 'Dispatch' pop */
  .logo-title span {
    color: var(--gold-dark);
    display: block; 
    margin-top: 5px;
  }

  .logo-tagline {
    font-family: 'Courier Prime', monospace;
    font-size: 16px;
    letter-spacing: 3px;
    color: var(--ink);
    margin-top: 35px;
    border-top: 3px solid var(--gold-dark);
    padding-top: 15px;
    width: 85%;
    font-weight: 700;
    opacity: 0.9;
  }
</style>

<div class="mug-print-area">
  <div class="logo-city">Baltimore</div>
  <h1 class="logo-title">
    The Daily<br>
    <span>Dispatch Quiz</span>
  </h1>
  <div class="logo-tagline">LOCAL NEWS • DAILY QUESTIONS<br>COMMUNITY KNOWLEDGE</div>
</div>
