<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mug Logo - High Contrast</title>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@700&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --ink: #1a1008;
      /* Darkened from Gold to a Deep Bronze/Ochre for better legibility */
      --gold-contrast: #8b5e05; 
    }

    body {
      margin: 0;
      padding: 0;
      background-color: transparent;
    }

    .mug-print-crop {
      width: 600px; 
      height: 380px; 
      background-color: transparent;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      color: var(--ink);
    }

    .logo-city {
      font-family: 'Courier Prime', monospace;
      font-size: 30px; /* Slightly larger */
      letter-spacing: 14px;
      text-transform: uppercase;
      color: var(--gold-contrast);
      margin-top: 10px;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .logo-title {
      font-family: 'Playfair Display', serif;
      font-size: 82px; 
      font-weight: 900;
      line-height: 0.95;
      margin: 0;
      color: var(--ink);
    }

    .logo-title span {
      color: var(--gold-contrast);
      display: block; 
      margin-top: 8px;
    }

    .logo-tagline {
      font-family: 'Courier Prime', monospace;
      font-size: 16px;
      letter-spacing: 3px;
      color: var(--ink);
      margin-top: 40px;
      border-top: 4px solid var(--gold-contrast); /* Thicker line for visibility */
      padding-top: 15px;
      width: 85%;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="mug-print-crop">
    <div class="logo-city">Baltimore</div>
    <h1 class="logo-title">
      The Daily<br>
      <span>Dispatch Quiz</span>
    </h1>
    <div class="logo-tagline">LOCAL NEWS • DAILY QUESTIONS<br>COMMUNITY KNOWLEDGE</div>
  </div>

</body>
</html>
