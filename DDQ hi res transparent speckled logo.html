<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mug Logo - Print Ready</title>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@700&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Re-using your exact colors from the previous code block */
      --ink: #1a1008;
      --gold-dark: #b8860b;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: transparent; /* Essential for your speckled mug */
    }

    /* THE MUG LOGO CONTAINER:
       Tightly cropped. Total height is 370px (approx 1.25 inches at 300dpi).
       When you take the Node Screenshot, this is the exact boundary.
    */
    .mug-print-crop {
      width: 600px; /* Standard wide-screen print area */
      height: 370px; /* TIGHTLY CROPPED to the text content */
      background-color: transparent; /* Mug speckles show through */
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      text-align: center;
      margin: 0;
      padding: 0; /* REMOVED all padding to eliminate extra space */
      box-sizing: border-box;
      color: var(--ink);
    }

    .logo-city {
      font-family: 'Courier Prime', monospace;
      font-size: 28px;
      letter-spacing: 14px;
      text-transform: uppercase;
      color: var(--gold-dark);
      /* Balanced top/bottom spacing to center text in the height */
      margin-top: 15px; 
      margin-bottom: 25px;
      font-weight: 700;
    }

    .logo-title {
      font-family: 'Playfair Display', serif;
      font-size: 82px; /* Large, bold serif for the main title */
      font-weight: 900;
      line-height: 0.95;
      margin: 0;
      color: var(--ink);
    }

    .logo-title span {
      color: var(--gold-dark);
      display: block; /* Forces line break, moves Gold to line 2 */
      margin-top: 5px;
    }

    .logo-tagline {
      font-family: 'Courier Prime', monospace;
      font-size: 16px;
      letter-spacing: 3px;
      color: var(--ink);
      margin-top: 40px; /* Space between title and final tagline */
      margin-bottom: 15px;
      border-top: 3px solid var(--gold-dark);
      padding-top: 15px;
      width: 85%;
      font-weight: 700;
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="mug-print-crop">
    <div class="logo-city">Baltimore</div>
    <h1 class="logo-title">
      The Daily<br>
      <span>Dispatch Quiz</span>
    </h1>
    <div class="logo-tagline">LOCAL NEWS • DAILY QUESTIONS<br>COMMUNITY KNOWLEDGE</div>
  </div>

</body>
</html>
