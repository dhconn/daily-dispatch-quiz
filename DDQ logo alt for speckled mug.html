<style>
  :root {
    --ink: #1a1008;
    --paper: #f5f0e8; /* Base Cream */
    --gold-dark: #b8860b;
    /* Darker brown for the speckles to look like natural clay grains */
    --speckle: rgba(44, 31, 14, 0.2); 
  }

  .mug-print-area {
    width: 600px; 
    height: 600px; 
    background-color: var(--paper);
    /* This creates the speckled texture using CSS gradients */
    background-image: 
      radial-gradient(var(--speckle) 1px, transparent 1px),
      radial-gradient(var(--speckle) 1px, transparent 1px),
      radial-gradient(rgba(255, 255, 255, 0.5) 1px, transparent 1px);
    background-size: 25px 25px, 40px 40px, 33px 33px;
    background-position: 0 0, 15px 10px, 5px 20px;
    
    color: var(--ink);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 50px;
    box-sizing: border-box;
    border: 1px solid #ddd; /* Visual edge for the print area */
  }

  .logo-city {
    font-family: 'Courier Prime', monospace;
    font-size: 28px;
    letter-spacing: 14px;
    text-transform: uppercase;
    color: var(--gold-dark);
    margin-bottom: 15px;
    font-weight: 700;
  }

  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: 90px; 
    font-weight: 900;
    line-height: 1.0;
    margin: 0;
    color: var(--ink);
    /* Subtle text shadow helps the logo pop against the texture */
    text-shadow: 1px 1px 0px var(--paper);
  }

  .logo-title span {
    color: var(--gold-dark);
    display: block; 
    margin-top: 5px;
  }

  .logo-tagline {
    font-family: 'Courier Prime', monospace;
    font-size: 16px;
    letter-spacing: 3px;
    color: var(--ink);
    margin-top: 35px;
    border-top: 3px solid var(--gold-dark);
    padding-top: 15px;
    width: 85%;
    font-weight: 700;
  }
</style>

<div class="mug-print-area">
  <div class="logo-city">Baltimore</div>
  <h1 class="logo-title">
    The Daily<br>
    <span>Dispatch Quiz</span>
  </h1>
  <div class="logo-tagline">LOCAL NEWS • DAILY QUESTIONS<br>COMMUNITY KNOWLEDGE</div>
</div>
